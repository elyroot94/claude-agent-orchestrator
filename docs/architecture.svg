<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10B981"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/>
    </marker>
  </defs>

  <rect width="1280" height="780" rx="0" fill="#0F172A"/>

  <text x="640" y="52" text-anchor="middle" fill="#F1F5F9" font-size="30" font-weight="700">Claude Agent Orchestrator</text>
  <text x="640" y="82" text-anchor="middle" fill="#94A3B8" font-size="16">De l'issue GitHub à la Pull Request testée — l'humain décide, les agents exécutent</text>

  <!-- ═══ HUMAIN ═══ -->
  <rect x="60" y="130" width="250" height="160" rx="14" fill="#1E293B" stroke="#F59E0B" stroke-width="2.5"/>
  <text x="185" y="165" text-anchor="middle" fill="#F59E0B" font-size="19" font-weight="700">👤 HUMAIN</text>
  <text x="185" y="196" text-anchor="middle" fill="#E2E8F0" font-size="14">pose le label «ai-ready»</text>
  <text x="185" y="220" text-anchor="middle" fill="#E2E8F0" font-size="14">arbitre les décisions</text>
  <text x="185" y="244" text-anchor="middle" fill="#E2E8F0" font-size="14">review + MERGE</text>
  <text x="185" y="270" text-anchor="middle" fill="#94A3B8" font-size="12">(le merge n'appartient qu'à lui)</text>

  <!-- ═══ GITHUB ═══ -->
  <rect x="430" y="130" width="250" height="160" rx="14" fill="#1E293B" stroke="#64748B" stroke-width="2.5"/>
  <text x="555" y="165" text-anchor="middle" fill="#CBD5E1" font-size="19" font-weight="700">🐙 GITHUB</text>
  <text x="555" y="196" text-anchor="middle" fill="#E2E8F0" font-size="14">issues + labels (machine à états)</text>
  <text x="555" y="220" text-anchor="middle" fill="#E2E8F0" font-size="14">webhooks issues / pull_request</text>
  <text x="555" y="244" text-anchor="middle" fill="#E2E8F0" font-size="14">PRs · commentaires injectés</text>
  <text x="555" y="270" text-anchor="middle" fill="#94A3B8" font-size="12">ai-ready → ai-in-progress → PR</text>

  <!-- ═══ N8N ═══ -->
  <rect x="800" y="130" width="420" height="160" rx="14" fill="#1E293B" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="1010" y="165" text-anchor="middle" fill="#60A5FA" font-size="19" font-weight="700">⚙️ n8n — ORCHESTRATEUR (VPS)</text>
  <text x="1010" y="196" text-anchor="middle" fill="#E2E8F0" font-size="14">webhook → Wait 5 s → lot d'issues (max 3)</text>
  <text x="1010" y="220" text-anchor="middle" fill="#E2E8F0" font-size="14">routage modèle : sensitive/complex → renforcé</text>
  <text x="1010" y="244" text-anchor="middle" fill="#E2E8F0" font-size="14">monitoring cron 10 min → emails dédoublonnés</text>
  <text x="1010" y="270" text-anchor="middle" fill="#94A3B8" font-size="12">launch-team.sh · monitor-team.sh</text>

  <!-- ═══ AGENT TEAM ═══ -->
  <rect x="800" y="420" width="420" height="180" rx="14" fill="#1E293B" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="1010" y="455" text-anchor="middle" fill="#A78BFA" font-size="19" font-weight="700">🤖 AGENT TEAM (Claude Code · tmux)</text>
  <text x="1010" y="486" text-anchor="middle" fill="#E2E8F0" font-size="14">team lead en delegate mode — ne code jamais</text>
  <text x="1010" y="510" text-anchor="middle" fill="#E2E8F0" font-size="14">1 teammate / issue · git worktree isolé · TDD</text>
  <text x="1010" y="534" text-anchor="middle" fill="#E2E8F0" font-size="14">décisions par défaut documentées + arbitrables</text>
  <text x="1010" y="560" text-anchor="middle" fill="#94A3B8" font-size="12">interdits : CI · migrations · secrets · main · merge</text>
  <text x="1010" y="582" text-anchor="middle" fill="#94A3B8" font-size="12">livraison : PR «Closes #N» + labels de review</text>

  <!-- ═══ E2E ═══ -->
  <rect x="60" y="420" width="420" height="180" rx="14" fill="#1E293B" stroke="#EF4444" stroke-width="2.5"/>
  <text x="270" y="455" text-anchor="middle" fill="#F87171" font-size="19" font-weight="700">🎭 FILET E2E (Playwright)</text>
  <text x="270" y="486" text-anchor="middle" fill="#E2E8F0" font-size="14">à chaque merge + nightly 03h00</text>
  <text x="270" y="510" text-anchor="middle" fill="#E2E8F0" font-size="14">verrou : attend la fin des teams (RAM partagée)</text>
  <text x="270" y="534" text-anchor="middle" fill="#E2E8F0" font-size="14">régression → issue documentée : repro +</text>
  <text x="270" y="558" text-anchor="middle" fill="#E2E8F0" font-size="14">cause racine (analyse du diff par Claude)</text>
  <text x="270" y="582" text-anchor="middle" fill="#94A3B8" font-size="12">run-e2e-regression.sh · dédoublonnage d'issues</text>

  <!-- FLÈCHES -->
  <!-- 1: humain → github -->
  <path d="M310 185 H424" stroke="#F59E0B" stroke-width="2.5" fill="none" marker-end="url(#arrAmber)"/>
  <circle cx="345" cy="185" r="13" fill="#F59E0B"/><text x="345" y="190" text-anchor="middle" fill="#0F172A" font-size="13" font-weight="700">1</text>
  <text x="368" y="172" fill="#FCD34D" font-size="12.5">ai-ready</text>

  <!-- 2: github → n8n -->
  <path d="M680 200 H794" stroke="#94A3B8" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <circle cx="715" cy="200" r="13" fill="#3B82F6"/><text x="715" y="205" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="700">2</text>
  <text x="737" y="188" fill="#93C5FD" font-size="12.5">webhook</text>

  <!-- 3: n8n → team -->
  <path d="M1010 290 V414" stroke="#94A3B8" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <circle cx="1010" cy="330" r="13" fill="#8B5CF6"/><text x="1010" y="335" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="700">3</text>
  <text x="1028" y="335" fill="#C4B5FD" font-size="12.5">MODEL=… launch-team.sh</text>

  <!-- 4: team → github (PR) -->
  <path d="M794 510 C 660 510, 640 340, 570 296" stroke="#10B981" stroke-width="2.5" fill="none" marker-end="url(#arrGreen)"/>
  <circle cx="680" cy="470" r="13" fill="#10B981"/><text x="680" y="475" text-anchor="middle" fill="#0F172A" font-size="13" font-weight="700">4</text>
  <text x="610" y="440" fill="#6EE7B7" font-size="12.5">PR «Closes #N»</text>

  <!-- 5: humain merge (github ← humain, déjà couvert) merge → e2e -->
  <path d="M430 250 C 330 300, 280 350, 272 414" stroke="#EF4444" stroke-width="2.5" fill="none" marker-end="url(#arrRed)"/>
  <circle cx="318" cy="330" r="13" fill="#EF4444"/><text x="318" y="335" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="700">5</text>
  <text x="336" y="322" fill="#FCA5A5" font-size="12.5">merge (humain) → webhook PR</text>

  <!-- 6: e2e → github (issue régression) -->
  <path d="M270 414 C 300 340, 420 310, 490 296" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="6 5" fill="none" marker-end="url(#arr)"/>
  <circle cx="405" cy="330" r="13" fill="#64748B"/><text x="405" y="335" text-anchor="middle" fill="#F1F5F9" font-size="13" font-weight="700">6</text>
  <text x="352" y="368" fill="#94A3B8" font-size="12.5">issue [REGRESSION] si échec</text>

  <!-- monitoring → humain -->
  <path d="M185 290 V 360 H 60" stroke="#94A3B8" stroke-width="0" fill="none"/>
  <path d="M800 244 C 500 380, 260 300, 196 296" stroke="#334155" stroke-width="0" fill="none"/>

  <!-- bandeau bas -->
  <rect x="60" y="650" width="1160" height="90" rx="14" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
  <text x="640" y="686" text-anchor="middle" fill="#E2E8F0" font-size="15" font-weight="600">🔁 La boucle : vos réponses en commentaires d'issue sont injectées dans le prompt du run suivant — et priment sur les décisions des agents</text>
  <text x="640" y="716" text-anchor="middle" fill="#94A3B8" font-size="13.5">📬 Monitoring email (10 min) : nouvelles PRs à reviewer · escalades · régressions — chaque alerte une seule fois</text>
</svg>
